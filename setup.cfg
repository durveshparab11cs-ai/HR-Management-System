[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    venv,
    migrations,
    instance
extend-ignore = E203, W503
per-file-ignores =
    app/models/*.py: E501
    tests/*: S101

[isort]
profile = black
line_length = 100
known_first_party = app

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning

[mypy]
python_version = 3.13
ignore_missing_imports = True
strict_optional = True
warn_return_any = True
