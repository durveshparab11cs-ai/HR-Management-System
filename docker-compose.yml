# ==============================================================================
# Smart HRMS — Docker Compose Configuration
# Orchestrates: Flask app, PostgreSQL, Redis, Nginx
# ==============================================================================

version: "3.9"

# ------------------------------------------------------------------------------
# Named volumes for data persistence
# ------------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local

# ------------------------------------------------------------------------------
# Custom network for service isolation
# ------------------------------------------------------------------------------
networks:
  hrms_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ------------------------------------------------------------------------------
# Services
# ------------------------------------------------------------------------------
services:

  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: hrms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_hrms_db}
      POSTGRES_USER: ${POSTGRES_USER:-hrms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strong_password_here}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrms_user} -d ${POSTGRES_DB:-smart_hrms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------------
  # Redis (Cache + Session Store)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hrms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_here}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hrms_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_password_here}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Flask Application
  # ----------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: hrms_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hrms_user}:${POSTGRES_PASSWORD:-strong_password_here}@db:5432/${POSTGRES_DB:-smart_hrms_db}
      CACHE_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_here}@redis:6379/0
      SESSION_REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_here}@redis:6379/1
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/instance/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrms_network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ----------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: hrms_nginx
    restart: unless-stopped
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/app/static:ro
      - app_logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - hrms_network
