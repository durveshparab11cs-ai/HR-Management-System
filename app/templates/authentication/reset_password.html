{% extends 'layouts/auth_base.html' %}

{% block title %}Reset Password — {{ app_name }}{% endblock %}

{% block auth_content %}
<h2 class="h5 fw-bold mb-1 text-center">Create new password</h2>
<p class="text-muted text-center small mb-4">Choose a strong password of at least 8 characters.</p>

<form method="POST" action="{{ url_for('authentication.reset_password', token=token) }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">

    <div class="mb-3">
        <label for="password" class="form-label fw-medium">New Password</label>
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock" aria-hidden="true"></i></span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="New password" required autocomplete="new-password">
            <button class="btn btn-outline-secondary hrms-password-toggle" type="button"
                    aria-label="Toggle password visibility" tabindex="-1">
                <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
        </div>
        <div class="hrms-password-strength mt-1" id="password-strength-bar"></div>
    </div>

    <div class="mb-4">
        <label for="confirm_password" class="form-label fw-medium">Confirm New Password</label>
        <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill" aria-hidden="true"></i></span>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   placeholder="Repeat new password" required autocomplete="new-password">
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 fw-semibold">Reset Password</button>
</form>
{% endblock %}
