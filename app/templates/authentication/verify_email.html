{% extends 'layouts/auth_base.html' %}

{% block title %}Verify Email — {{ app_name }}{% endblock %}

{% block auth_content %}
<div class="text-center">
    <div class="hrms-verify-icon mb-3">
        <i class="bi bi-envelope-check-fill text-success" style="font-size: 3rem;" aria-hidden="true"></i>
    </div>
    <h2 class="h5 fw-bold mb-2">Verifying your email…</h2>
    <p class="text-muted small mb-4">Please wait while we verify your email address.</p>
    <a href="{{ url_for('authentication.login') }}" class="btn btn-outline-primary">
        Go to Sign In
    </a>
</div>
{% endblock %}
