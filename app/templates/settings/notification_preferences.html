{% extends 'layouts/base.html' %}
{% block title %}Notification Preferences — {{ app_name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card border-0 shadow-sm">
    <div class="card-header bg-transparent border-0 py-4 px-4">
        <h5 class="fw-bold mb-0"><i class="bi bi-bell me-2 text-info"></i>Notification Preferences</h5>
    </div>
    <div class="card-body px-4 pb-4 text-muted text-center py-5">
        <i class="bi bi-bell-slash" style="font-size:3rem;opacity:.3"></i>
        <p class="mt-3 mb-0">Notification preferences will be configurable in a future release.</p>
    </div>
</div>
</div>
</div>
{% endblock %}
