<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}{{ title | default('') }} — {{ app_name }}{% endblock %}</title>

    {# <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}"> #}

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/authentication.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body class="hrms-auth-body bg-light">

    <div class="hrms-auth-wrapper min-vh-100 d-flex align-items-center justify-content-center p-3">
        <div class="hrms-auth-container w-100">

            <!-- Brand header -->
            <div class="text-center mb-4">
                <div class="hrms-auth-logo d-inline-flex align-items-center justify-content-center
                             rounded-3 mb-3 bg-primary text-white p-3">
                    <i class="bi bi-grid-3x3-gap-fill fs-2" aria-hidden="true"></i>
                </div>
                <h1 class="h4 fw-bold mb-0">{{ app_name }}</h1>
                <p class="text-muted small mt-1">Human Resource Management System</p>
            </div>

            <!-- Flash messages -->
            {% include 'shared/flash_messages.html' %}

            <!-- Auth card -->
            <div class="card hrms-auth-card shadow-sm border-0">
                <div class="card-body p-4">
                    {% block auth_content %}{% endblock %}
                </div>
            </div>

            <!-- Footer -->
            <p class="text-center text-muted small mt-4">
                &copy; {{ current_year }} {{ app_name }}. All rights reserved.
            </p>

        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmOaHVpqJ6lIyLzXnXpLjdQANia"
        crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
