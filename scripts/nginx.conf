# ===========================================================================
# Smart HRMS — Nginx Reverse Proxy Configuration
# ===========================================================================
# Place this file at /etc/nginx/nginx.conf or mount via Docker volume.
# Proxies HTTP traffic to the Gunicorn WSGI server running on port 8000.
# ===========================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zone — 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=hrms_limit:10m rate=10r/s;

    upstream hrms_app {
        server app:8000 fail_timeout=0;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "SAMEORIGIN"       always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        client_max_body_size 20M;

        # Static files served directly by Nginx (bypasses Flask)
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Favicon
        location = /favicon.ico {
            alias /app/static/images/favicon.ico;
            access_log off;
            log_not_found off;
        }

        # All other requests proxied to Gunicorn
        location / {
            limit_req zone=hrms_limit burst=20 nodelay;

            proxy_pass         http://hrms_app;
            proxy_redirect     off;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;

            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
